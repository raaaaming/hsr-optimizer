<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d1030">
<title>HSR Optimizer — 캐릭터 속성</title>
<link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="topbar">
    <h1>HSR Optimizer</h1>
    <div class="topbar-actions">
        <select id="buildPicker" aria-label="저장된 빌드">
            <option value="">— 저장된 빌드 —</option>
        </select>
        <button id="newBtn" type="button" class="ghost">새 빌드</button>
        <button id="saveBtn" type="button" class="primary">저장</button>
        <button id="deleteBtn" type="button" class="danger">삭제</button>
    </div>
</header>

<p id="toast" class="toast" role="status" aria-live="polite"></p>

<main class="layout">

    <!-- ===== 편집 ===== -->
    <section class="panel editor" aria-label="빌드 편집">

        <h2 class="panel-title">빌드 설정</h2>

        <div class="field">
            <label for="buildName">빌드 이름</label>
            <input id="buildName" type="text" value="새 빌드">
        </div>

        <div class="grid-2">
            <div class="field">
                <label for="characterSelect">캐릭터</label>
                <select id="characterSelect"></select>
            </div>
            <div class="field">
                <label for="eidolon">성혼</label>
                <select id="eidolon"></select>
            </div>
        </div>

        <div class="grid-2">
            <div class="field">
                <label for="ascension">돌파</label>
                <select id="ascension"></select>
            </div>
            <div class="field">
                <label for="level">레벨 <span id="levelCap" class="hint"></span></label>
                <input id="level" type="number" min="1" max="80" value="80">
            </div>
        </div>

        <h3 class="section-title">스킬</h3>
        <div id="skills" class="grid-2"></div>

        <h3 class="section-title">큰 행적</h3>
        <div id="majorTraces" class="chips"></div>

        <h3 class="section-title">
            작은 행적
            <button id="traceAll" type="button" class="link">전체 선택</button>
        </h3>
        <div id="minorTraces" class="chips"></div>

        <h3 class="section-title">광추</h3>
        <div class="field">
            <label for="lcSelect">광추</label>
            <select id="lcSelect"></select>
        </div>
        <div class="grid-2">
            <div class="field">
                <label for="lcLevel">레벨</label>
                <input id="lcLevel" type="number" min="1" max="80" value="80">
            </div>
            <div class="field">
                <label for="lcSuper">중첩(재련)</label>
                <select id="lcSuper"></select>
            </div>
        </div>

        <h3 class="section-title">
            유효 옵션
            <span id="effectiveHint" class="hint-inline"></span>
        </h3>
        <div id="effectiveStats" class="chips"></div>

        <h3 class="section-title">유물</h3>
        <div id="relics" class="relic-editor"></div>

    </section>

    <!-- ===== 결과 ===== -->
    <section class="panel sheet" aria-label="캐릭터 속성">

        <div class="hero">
            <img id="heroArt" class="hero-art" alt="" width="374" height="512">
            <div class="hero-info">
                <header class="sheet-head">
                    <div>
                        <span id="sheetName" class="sheet-name">—</span>
                        <span id="sheetLevel" class="badge">Lv.80</span>
                    </div>
                    <div id="sheetTags" class="sheet-tags"></div>
                </header>
                <div id="heroSkills" class="hero-skills"></div>
                <div id="heroLightCone" class="hero-lc"></div>
            </div>
        </div>

        <h2 class="panel-title">캐릭터 속성</h2>
        <div id="statGrid" class="stat-grid"></div>

        <h2 class="panel-title">세트 효과</h2>
        <div id="setList" class="set-list"></div>

        <h2 class="panel-title">
            유효 보조 속성 명중 통계
            <span id="rollTotal" class="roll-total">0</span>
        </h2>
        <div id="rollList" class="chips"></div>

        <h2 class="panel-title">유물 속성</h2>
        <div id="relicCards" class="relic-cards"></div>

    </section>

</main>

<footer class="foot">
    <p>수치 데이터는 검증 전 자리표시자입니다. 계산 구조는 확정입니다.</p>
</footer>

<script src="/app.js" type="module"></script>
</body>
</html>
